<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>RAGEBAIT 2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Courier New',monospace;touch-action:none;user-select:none;}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;border:3px solid #2a1a4a;box-shadow:0 0 32px #6a00ff44;}
#touch-controls{display:none;width:100%;position:fixed;bottom:0;left:0;height:28vh;pointer-events:none;}
#touch-controls.active{display:flex;}
.touch-btn{position:absolute;bottom:16px;width:200px;height:200px;border-radius:24px;background:rgba(120,0,255,0.1);border:3px solid rgba(180,0,255,0.25);display:flex;align-items:center;justify-content:center;pointer-events:all;-webkit-tap-highlight-color:transparent;touch-action:none;font-size:72px;color:rgba(200,100,255,0.55);transition:background 0.05s;user-select:none;}
.touch-btn:active,.touch-btn.pressed{background:rgba(180,0,255,0.28);border-color:rgba(220,100,255,0.6);color:rgba(255,200,255,0.95);}
#btn-left{left:12px;}
#btn-right{left:224px;}
#btn-jump{right:12px;width:200px;height:200px;border-radius:50%;background:rgba(0,200,255,0.14);border-color:rgba(0,200,255,0.4);color:rgba(0,200,255,0.75);font-size:26px;font-family:monospace;letter-spacing:1px;}
#btn-jump:active,#btn-jump.pressed{background:rgba(0,200,255,0.35);border-color:rgba(0,200,255,0.9);}
#btn-back-mobile{position:fixed;top:10px;left:10px;width:220px;height:80px;border-radius:18px;background:rgba(0,0,0,0.7);border:3px solid rgba(180,0,255,0.4);color:rgba(200,150,255,0.9);font-family:monospace;font-size:24px;display:none;align-items:center;justify-content:center;pointer-events:all;touch-action:none;z-index:100;-webkit-tap-highlight-color:transparent;}
#btn-back-mobile.active{display:flex;}
@media(orientation:landscape)and(max-height:520px){
  body{justify-content:center;align-items:center;}
  #touch-controls{height:100vh;width:100vw;bottom:0;left:0;}
  .touch-btn{width:110px;height:110px;font-size:44px;border-radius:18px;bottom:auto;}
  #btn-left{left:8px;top:50%;transform:translateY(-120%);}
  #btn-right{left:126px;top:50%;transform:translateY(-120%);}
  #btn-jump{right:8px;left:auto;top:50%;transform:translateY(-50%);width:130px;height:130px;font-size:16px;border-radius:50%;}
  #btn-back-mobile{top:6px;left:6px;right:auto;width:110px;height:44px;font-size:14px;border-radius:10px;}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="touch-controls">
  <div class="touch-btn" id="btn-left">◀</div>
  <div class="touch-btn" id="btn-right">▶</div>
  <div class="touch-btn" id="btn-jump">JUMP</div>
</div>
<div id="btn-back-mobile">◀ MENU</div>
<script>

// ─── Audio ───────────────────────────────────────────────────────────────────
const LEVEL_TRACKS=['music.mp3','music2.mp3','music3.mp3','music4.mp3','music5.mp3','music6.mp3','music7.mp3','music8.mp3','music9.mp3','music10.mp3'];
function trackForLevel(lvl){return LEVEL_TRACKS[Math.min(Math.floor((lvl-1)/10),9)];}
let currentTrackSrc='title.mp3';
const bgMusic=new Audio('title.mp3');
const deathSfx=new Audio('death.mp3');
const jumpSfx=new Audio('jump.mp3');
const winSfx=new Audio('win.mp3');
const clickSfx=new Audio('click.mp3');
clickSfx.volume=0.6; jumpSfx.volume=0.25; bgMusic.volume=0.4;
bgMusic.addEventListener('ended',()=>{
  if(gameMode==='infinite'&&gameState==='playing'){
    infiniteMusicIdx=(infiniteMusicIdx+1)%LEVEL_TRACKS.length;
    setMusicTrack(LEVEL_TRACKS[infiniteMusicIdx]);
  } else {
    bgMusic.play().catch(()=>{});
  }
});
function setMusicTrack(src){if(currentTrackSrc===src)return;currentTrackSrc=src;bgMusic.src=src;bgMusic.play().catch(()=>{});}
function tryPlayMusic(){bgMusic.play().catch(()=>{});}
function playClick(){clickSfx.currentTime=0;clickSfx.play().catch(()=>{});}
document.addEventListener('keydown',tryPlayMusic,{once:true});
document.addEventListener('click',tryPlayMusic,{once:true});

// ─── Canvas ──────────────────────────────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
// 16-bit style: larger resolution for more detail
const W=480,H=320,BRAND_H=14;
canvas.width=W; canvas.height=H+BRAND_H;

const IS_MOBILE=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)||(navigator.maxTouchPoints>1&&window.innerWidth<900);
function resizeCanvas(){
  const isLandscape=IS_MOBILE&&window.innerWidth>window.innerHeight;
  let availW,availH;
  if(isLandscape){const sr=130;availW=window.innerWidth-sr*2;availH=window.innerHeight;}
  else if(IS_MOBILE){availW=window.innerWidth;availH=window.innerHeight-Math.round(window.innerHeight*0.40);}
  else{availW=window.innerWidth;availH=window.innerHeight;}
  let scale;
  if(isLandscape){scale=Math.max(1,Math.min(availW/W,availH/(H+BRAND_H)));scale=Math.round(scale*10)/10;}
  else{scale=Math.max(1,Math.floor(Math.min(availW/W,availH/(H+BRAND_H))));}
  canvas.style.width=W*scale+'px';canvas.style.height=(H+BRAND_H)*scale+'px';
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);
window.addEventListener('orientationchange',()=>setTimeout(resizeCanvas,100));

// ─── Frame-rate independent timing ───────────────────────────────────────────
// All physics use dt normalised to 60fps so 60fps and 144fps feel identical.
// dt = elapsed_ms / (1000/60) = elapsed_ms * 0.06
// The loop already computes dt = (ts-lastTime)/16.67 which equals 1.0 at 60fps.
// We just make sure every physics value is multiplied by dt.

// ─── Constants ───────────────────────────────────────────────────────────────
const GRAVITY=0.9;
// Max jump height = JUMP_FORCE²/(2*GRAVITY) = 11²/(2*0.9) ≈ 67px
const JUMP_FORCE=-11.0;
const SPEED=3.0;
const TILE=10;

// ─── State ───────────────────────────────────────────────────────────────────
let level=1,deaths=0,levelDeaths=0;
let keys={};
let player,platforms,camera,bgDecor,deathParticles,boulders,lasers,lavaY,lavaStartTime;
let gameState='menu';
let menuStarted=false;
let windDir=0;
let windTimer=0;
let windLevelCount=0;

// ─── Game modes ───────────────────────────────────────────────────────────────
let gameMode='normal'; // 'normal'|'hard'|'hardcore'|'infinite'
const MODES=['normal','hard','hardcore','infinite'];
const MODE_COLORS={normal:'#44ff88',hard:'#ffaa22',hardcore:'#ff4444',infinite:'#44aaff'};
const BTN_MODE={x:W-68,y:3,w:66,h:13};

// Hard/hardcore timer
let hardTimerMs=3600000,hardActive=false,lastHardTick=0;
const HARD_TIME=100*60*1000;
const HARD_DEATH_PENALTY=5000;
let hardcoreRecord=0;

// Infinite mode
let infiniteScore=0,infiniteRecord=0;
let infinitePlatCount=0;
let infiniteBiomeOverride=null;
let lastInfiniteBiome=null;
let infiniteMusicIdx=0;
let infiniteTopY=0;       // world Y of the highest generated platform
let infiniteScoredPlats=new Set(); // tracks which platform objects have been scored

// Tiers
function getTier(ms, deaths){
  const mins = ms / 60000;
  if      (mins < 60  && deaths < 50)  return 'S TIER';
  else if (mins < 60  && deaths < 100) return 'A+ TIER';
  else if (mins < 70  && deaths < 150) return 'A TIER';
  else if (mins < 80  && deaths < 200) return 'A- TIER';
  else if (mins < 80  && deaths < 250) return 'B+ TIER';
  else if (mins < 85  && deaths < 300) return 'B TIER';
  else if (mins < 90  && deaths < 350) return 'B- TIER';
  else if (mins < 95  && deaths < 400) return 'C+ TIER';
  else if (mins < 100 && deaths < 450) return 'C TIER';
  else if (mins < 105 && deaths < 500) return 'C- TIER';
  else if (mins < 110 && deaths < 550) return 'D+ TIER';
  else if (mins < 120 && deaths < 600) return 'D TIER';
  else if (mins < 140 && deaths < 800) return 'D- TIER';
  else return 'F TIER';
}
function saveTier(mode,tier){try{localStorage.setItem('rb2_tier_'+mode,tier);}catch{}}
function loadTier(mode){try{return localStorage.getItem('rb2_tier_'+mode)||'';}catch{return '';}}
function saveHardcoreRecord(){try{localStorage.setItem('rb2_hc',String(hardcoreRecord));}catch{}}
function loadHardcoreRecord(){try{hardcoreRecord=parseInt(localStorage.getItem('rb2_hc')||'0');}catch{}}
function saveInfiniteRecord(){try{localStorage.setItem('rb2_inf',String(infiniteRecord));}catch{}}
function loadInfiniteRecord(){try{infiniteRecord=parseInt(localStorage.getItem('rb2_inf')||'0');}catch{}}

// ─── Ghost (chase every 10 levels) ───────────────────────────────────────────
const GHOST_SPAWN_DELAY=2000; // 2000ms before ghost starts chasing
const GHOST_DELAY=2000; // 2000ms behind player
let ghostBuffer=[],ghostActive=false,ghostPos={x:0,y:0},ghostSpawnStartTime=0;
function isBossLevel(lvl){return lvl%10===0&&lvl>0;}
function startGhostRecording(){ghostBuffer=[];ghostSpawnStartTime=Date.now();}
function tickGhostRecord(){
  if(!player)return;
  ghostBuffer.push({x:player.x,y:player.y,t:Date.now()});
}
function updateGhost(){
  if(!ghostActive||!isBossLevel(level))return;
  if(Date.now()-ghostSpawnStartTime<GHOST_SPAWN_DELAY)return; // 2s cooldown before ghost appears
  // Find entry from 2 seconds ago
  const now=Date.now();
  let entry=null;
  for(let i=ghostBuffer.length-1;i>=0;i--){
    if(now-ghostBuffer[i].t>=GHOST_DELAY){entry=ghostBuffer[i];break;}
  }
  if(entry)ghostPos={x:entry.x,y:entry.y};
  if(!player||player.dead)return;
  if(Math.abs(ghostPos.x-player.x)<player.w&&Math.abs(ghostPos.y-player.y)<player.h)killPlayer();
}

// ─── Transition ───────────────────────────────────────────────────────────────
let transition=null;
function startTransition(dir,speed,onDone){transition={dir,progress:dir==='in'?1:0,speed:speed||0.04,onDone};}
function updateTransition(){
  if(!transition)return;
  if(transition.dir==='out'){transition.progress+=transition.speed;if(transition.progress>=1){transition.progress=1;if(transition.onDone){transition.onDone();transition.onDone=null;}transition.dir='in';}}
  else{transition.progress-=transition.speed;if(transition.progress<=0){transition.progress=0;transition.dir=null;transition=null;}}
}
function drawTransition(){
  if(!transition)return;const t=transition.progress;if(t<=0)return;
  const bw=10,cols=Math.ceil(W/bw);
  for(let c=0;c<cols;c++){const delay=c/cols;const lt=Math.max(0,Math.min(1,(t-delay)/(1-delay+0.001)));const bh=Math.round(lt*(H+BRAND_H));ctx.fillStyle='#050010';ctx.fillRect(c*bw,0,bw,bh);}
}

// ─── Records ─────────────────────────────────────────────────────────────────
function loadRecords(){try{return JSON.parse(localStorage.getItem('rb2_records')||'{}');}catch{return{};}}
function saveRecords(r){try{localStorage.setItem('rb2_records',JSON.stringify(r));}catch{}}
function recordLevelComplete(lvl,deathCount,ms){
  const section=Math.floor((lvl-1)/10)+1;
  const key='rb2_records_'+gameMode; // separate per mode
  let r;try{r=JSON.parse(localStorage.getItem(key)||'{}');}catch{r={};}
  if(!r[section])r[section]={totalDeaths:0,bestMs:null};
  r[section].totalDeaths=(r[section].totalDeaths||0)+deathCount;
  if(r[section].bestMs===null||ms<r[section].bestMs)r[section].bestMs=ms;
  try{localStorage.setItem(key,JSON.stringify(r));}catch{}
}
function loadRecordsForMode(mode){
  try{return JSON.parse(localStorage.getItem('rb2_records_'+mode)||'{}');}catch{return{};}
}
function saveProgress(){try{localStorage.setItem('rb2_progress_'+gameMode,JSON.stringify({level,deaths,totalMs,hardTimerMs:((gameMode==='hard'||gameMode==='hardcore')?hardTimerMs:undefined)}));}catch{}}
function loadProgress(){try{const p=JSON.parse(localStorage.getItem('rb2_progress_'+gameMode)||'null');if(p){level=p.level||1;deaths=p.deaths||0;totalMs=p.totalMs||0;levelDeaths=0;if((gameMode==='hard'||gameMode==='hardcore')&&p.hardTimerMs){hardTimerMs=p.hardTimerMs;}}}catch{}}
function hasSavedProgress(){try{return localStorage.getItem('rb2_progress_'+gameMode)!==null;}catch{return false;}}
function clearProgress(){try{localStorage.removeItem('rb2_progress_'+gameMode);}catch{}}
function clearAllData(){try{localStorage.removeItem('rb2_progress');localStorage.removeItem('rb2_records');['normal','hard','hardcore','infinite'].forEach(m=>{localStorage.removeItem('rb2_progress_'+m);localStorage.removeItem('rb2_records_'+m);localStorage.removeItem('rb2_tier_'+m);});localStorage.removeItem('rb2_hc');localStorage.removeItem('rb2_inf');}catch{}}

// ─── Timer ───────────────────────────────────────────────────────────────────
let timerStart=null,timerRunning=false,totalMs=0,levelStartMs=0;
function startTimerIfNeeded(){if(!timerRunning){timerRunning=true;timerStart=Date.now();levelStartMs=getElapsedMs();}}
function getElapsedMs(){if(!timerRunning)return totalMs;return totalMs+(Date.now()-timerStart);}
function getLevelMs(){return getElapsedMs()-levelStartMs;}
function formatTime(ms){const s=Math.floor(ms/1000);const m=Math.floor(s/60);const ss=String(s%60).padStart(2,'0');const cs=String(Math.floor((ms%1000)/10)).padStart(2,'0');return m+':'+ss+'.'+cs;}

// ─── RNG ─────────────────────────────────────────────────────────────────────
function mulberry32(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;let t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let playthroughSeed=Math.floor(Math.random()*0xffffff);


// ─── Biome system ─────────────────────────────────────────────────────────────
// 1-10:forest day, 11-20:suburbs day, 21-30:egypt day, 31-40:river night,
// 41-50:clouds midnight, 51-60:mars, 61-70:ice tundra, 71-80:flower meadow thunder,
// 81-90:jungle rain, 91-100:milkyway
function getBiome(lvl){
  const t=Math.floor((lvl-1)/10);
  return['forest','suburbs','egypt','river','clouds','mars','tundra','meadow','jungle','galaxy'][t]||'forest';
}

// Sky gradient colors per biome [top→bottom bands]
const BIOME_SKY={
  forest: [[34,85,34],[45,110,45],[60,140,55],[80,160,60],[100,180,70],[130,200,80],[160,210,100],[190,220,130]],
  suburbs:[[80,160,255],[100,180,255],[130,200,255],[160,215,255],[185,225,255],[210,235,255],[230,242,255],[245,250,255]],
  egypt:  [[255,200,80],[255,180,60],[255,160,40],[255,140,30],[240,120,20],[220,100,10],[200,80,5],[180,60,0]],
  river:  [[5,10,30],[8,15,45],[12,22,60],[10,18,50],[7,13,38],[5,10,28],[3,7,20],[2,5,14]],
  clouds: [[10,10,40],[15,15,55],[20,20,70],[15,15,55],[10,10,40],[8,8,30],[5,5,20],[3,3,12]],
  mars:   [[80,30,10],[100,40,15],[120,50,20],[100,40,15],[80,30,10],[60,20,8],[40,12,5],[25,8,3]],
  tundra: [[140,170,210],[160,185,220],[180,200,230],[165,188,222],[148,172,212],[130,158,200],[115,145,190],[100,132,180]],
  meadow: [[30,30,60],[40,40,80],[55,55,100],[45,45,85],[35,35,70],[25,25,55],[18,18,42],[12,12,30]],
  jungle: [[20,50,20],[30,70,25],[40,90,30],[35,80,28],[28,65,22],[20,50,18],[14,38,14],[10,28,10]],
  galaxy: [[0,0,5],[1,0,10],[2,0,18],[1,0,12],[0,0,7],[0,0,4],[0,0,2],[0,0,1]],
};

// ─── Platform factory ─────────────────────────────────────────────────────────
// All platforms are pass-through (jump up through, land on top)
// New platform types per zone:
// 1-10: normal (static pass-through)
// 11-20: breakable (timer, breaks after standing too long)
// 21-30: moving (up/down or left/right)
// 31-40: spring (doubles jump height when landing)
// 41-50: spike_rotate (rotating spike platform - must time jump, spikes face down kill)
// 51-60: blink (appears/disappears every second)
// 61-70: (boulders falling - handled separately)
// 71-80: slippery
// 81-90: (horizontal lasers - handled separately)
// 91-100: (lava rising - handled separately) + normal platforms

function makePlatform(x,y,w,type,rng){
  const colors={
    normal:   [80,200,80],
    breakable:[220,160,40],
    moving:   [60,140,255],
    spring:   [255,80,200],
    spike_rotate:[200,50,50],
    blink:    [80,220,255],
    slippery: [160,230,255],
    goal:     [255,220,50],
  };
  const c=colors[type]||[120,120,120];
  return{
    x,y,w,h:TILE,type,
    originX:x,originY:y,
    moveDir:rng()>0.5?1:-1,
    moveAxis:rng()>0.5?'x':'y',
    moveRange:20+rng()*30,
    moveSpeed:1.2+rng()*1.0,  // faster moving platforms
    // breakable: real-time
    breakStartTime:null,
    broken:false,
    respawnTime:0,
    // blink: real-time
    blinkFlipTime:Date.now(),
    blinkOn:true,
    // spike_rotate: real-time flip
    spikesSide:rng()>0.5?'top':'bottom',
    flipTime:Date.now(),
    flipped:false,
    // legacy (unused but kept for safety)
    rotAngle:0,
    rotSpeed:0,
    springBounce:0,
    color:c,
    crumbling:false,
  };
}

// ─── Level generation (VERTICAL layout - player rises upward) ─────────────────
// The level extends UPWARD. Player starts at bottom, goal is at top.
// Camera Y moves upward as player rises.

function generateLevel(lvl){
  const rng=mulberry32(playthroughSeed^(lvl*1337+42));
  const plats=[];
  const biome=getBiome(lvl);

  // Weighted platform type picker per zone
  function getZoneWeights(lvl){
    if(lvl<=10) return {normal:100};
    if(lvl<=20) return {normal:50,breakable:50};
    if(lvl<=30) return {normal:34,breakable:33,moving:33};
    if(lvl<=40) return {normal:25,breakable:25,moving:25,spring:25};
    if(lvl<=50) return {normal:20,breakable:20,moving:20,spring:20,spike_rotate:20};
    if(lvl<=60) return {normal:17,breakable:17,moving:17,spring:17,spike_rotate:16,blink:16};
    if(lvl<=70) return {normal:17,breakable:17,moving:17,spring:17,spike_rotate:16,blink:16};
    if(lvl<=80) return {normal:14,breakable:14,moving:14,spring:14,spike_rotate:14,blink:15,slippery:15};
    if(lvl<=90) return {normal:14,breakable:14,moving:14,spring:14,spike_rotate:14,blink:15,slippery:15};
    return {normal:14,breakable:14,moving:14,spring:14,spike_rotate:14,blink:15,slippery:15};
  }
  function pickWeighted(weights,rng){
    const total=Object.values(weights).reduce((a,b)=>a+b,0);
    let r=rng()*total;
    for(const[k,v] of Object.entries(weights)){r-=v;if(r<=0)return k;}
    return Object.keys(weights)[0];
  }

  // Complexity
  const zoneProgress=((lvl-1)%10)/9;

  // Start platform at bottom center
  const startY=0;
  const startPlat=makePlatform(W/2-30,startY,60,'normal',rng);
  startPlat.color=[80,200,80];
  plats.push(startPlat);

  const count=10+Math.floor(zoneProgress*8)+Math.floor((lvl-1)/10)*2;
  let lastX=W/2;
  let lastY=startY;
  let prevType='normal';
  let prevRise=0;

  const weights=getZoneWeights(lvl);

  for(let i=0;i<count;i++){
    const rise=32+rng()*14; // 32–46px, always reachable under 67px max

    // Spring = 2x Y gap for next platform
    const effectiveRise=prevType==='spring'?rise*2.0:rise;

    // X spacing: max 50px shift, and clamp the ACTUAL center to stay in
    // the middle 60% of the screen so we never drift to an edge
    const xDir=rng()>0.5?1:-1;
    const xShift=xDir*(15+rng()*35); // 15–50px sideways
    // Platform width: unique per platform, shrinks as levels progress
    // Section 1 (lvl 1-10): 36–52px, Section 10 (lvl 91-100): 18–28px
    const baseW=Math.max(18,52-Math.floor(lvl/10)*4);
    const wVariance=Math.max(4,12-Math.floor(lvl/10));
    const pw=Math.max(18,baseW-wVariance+Math.floor(rng()*wVariance*2));
    // Clamp center to [pw/2+20, W-pw/2-20] so platform is always reachable
    const rawCenter=lastX+xShift;
    const clampedCenter=Math.max(pw/2+20,Math.min(W-pw/2-20,rawCenter));
    const px=Math.max(6,Math.min(W-pw-6,clampedCenter-pw/2));
    const py=lastY-effectiveRise;

    // Pick weighted type, avoid consecutive spike_rotate or blink
    let type=pickWeighted(weights,rng);
    if((type==='spike_rotate'||type==='blink')&&(prevType==='spike_rotate'||prevType==='blink')){
      type='normal';
    }
    // Don't use spike_rotate on first 3 platforms of zone
    if(type==='spike_rotate'&&i<3)type='normal';

    const plat=makePlatform(px,py,pw,type,rng);

    // Moving platform: clamp originX so the FULL sweep stays on screen
    if(type==='moving'&&plat.moveAxis==='x'){
      const margin=6+plat.moveRange;
      plat.originX=Math.max(margin,Math.min(W-plat.w-margin,px));
      plat.x=plat.originX;
    }
    // Moving platform (y-axis): reduce moveRange so it doesn't swing into
    // impossible territory — cap at 25px so the top of the swing is reachable
    if(type==='moving'&&plat.moveAxis==='y'){
      plat.moveRange=Math.min(plat.moveRange,25);
    }

    plats.push(plat);
    lastX=px+pw/2; // track actual center
    lastY=py;
    prevType=type;
    prevRise=effectiveRise;
  }

  // Goal platform at top (not for infinite mode)
  if(gameMode!=='infinite'){
    const goalY=lastY-40;
    const goalX=Math.max(6,Math.min(W-60,lastX-30));
    plats.push({x:goalX,y:goalY,w:60,h:TILE,type:'goal',color:[255,220,50],
      originX:goalX,originY:goalY,moveAxis:'y',moveDir:1,moveRange:0,moveSpeed:0,
      broken:false,crumbling:false,blinkOn:true,blinkFlipTime:Date.now(),rotAngle:0,rotSpeed:0,springBounce:0,
      breakStartTime:null,respawnTime:0,spikesSide:'top',flipTime:Date.now(),flipped:false});
  }

  const levelHeight=Math.abs(lastY)-80;

  // Boulders for levels 61+ (not just 61-70)
  const boulderList=[];
  if(lvl>=61){
    // Only ONE boulder active at a time — it falls all the way to the bottom,
    // then the next one spawns. We model this as a single boulder object.
    boulderList.push({
      x:Math.random()*W,
      y:-30, // starts above screen
      r:12+Math.floor(rng()*8), // doubled size
      vy:0,
      active:false,      // false = waiting to spawn
      warning:false,     // true = showing warning icon
      warnStartTime:0,   // when warning started
      fallen:false,      // true = has gone off bottom, ready to respawn
      spawnDelay:1000,   // ms between boulder hitting bottom and next warning
      nextSpawnTime:Date.now()+1000, // when to show next warning
    });
  }

  // Horizontal lasers for levels 81-90
  const laserList=[];
  if(lvl>=81&&lvl<=90){
    const lCount=2+Math.floor(zoneProgress*4);
    for(let i=0;i<lCount;i++){
      const ly=lastY+Math.floor(rng()*levelHeight*0.8);
      laserList.push({
        y:ly,
        active:false,
        timer:Math.floor(rng()*120),
        interval:80+Math.floor(rng()*80),
        warnFrames:30,
        state:'idle', // idle, warn, fire
      });
    }
  }

  return{plats,levelHeight,boulderList,laserList};
}

// ─── Infinite mode batch generator ───────────────────────────────────────────
// Generates a batch of platforms rising upward from fromY.
// Uses a random zone each batch for variety.
let _infBatchSeed=Date.now();
let _infCurrentBiomeIdx=0; // only changes at score milestones
// Zone weights for infinite mode — ONE new type introduced per 200 score tier.
// Never dump all types at once — each tier adds just one new mechanic.
function _infGetWeights(score){
  // Tier 0 (0–199):    only normal
  // Tier 1 (200–399):  normal + breakable
  // Tier 2 (400–599):  + moving
  // Tier 3 (600–799):  + spring
  // Tier 4 (800–999):  + spike_rotate
  // Tier 5 (1000–1199):+ blink
  // Tier 6 (1200–1599):+ slippery
  // Tier 7 (1600+):    all types, balanced
  const tier=Math.min(Math.floor(score/200),7);
  if(tier===0)return{normal:100};
  if(tier===1)return{normal:60,breakable:40};
  if(tier===2)return{normal:50,breakable:30,moving:20};
  if(tier===3)return{normal:40,breakable:25,moving:20,spring:15};
  if(tier===4)return{normal:35,breakable:22,moving:18,spring:15,spike_rotate:10};
  if(tier===5)return{normal:30,breakable:20,moving:18,spring:14,spike_rotate:10,blink:8};
  if(tier===6)return{normal:28,breakable:18,moving:16,spring:12,spike_rotate:10,blink:8,slippery:8};
  return{normal:25,breakable:16,moving:15,spring:12,spike_rotate:11,blink:11,slippery:10};
}
function generateInfiniteBatch(fromY, count){
  _infBatchSeed=(_infBatchSeed*1664525+1013904223)>>>0;
  const rng=mulberry32(_infBatchSeed^(fromY|0));

  function pickW(weights,rng){
    const total=Object.values(weights).reduce((a,b)=>a+b,0);
    let r=rng()*total;
    for(const[k,v] of Object.entries(weights)){r-=v;if(r<=0)return k;}
    return Object.keys(weights)[0];
  }
  const weights=_infGetWeights(infiniteScore);

  // Platform width: starts at 48px, slowly shrinks to 24px by score 3000.
  // Score 0→3000 maps to width 48→24. Beyond 3000 stays at 24.
  function platWidth(rng){
    const shrink=Math.min(infiniteScore/3000,1); // 0 at score 0, 1 at score 3000
    const base=Math.round(48-shrink*24); // 48px → 24px
    const variance=Math.floor(rng()*8)-4; // ±4px per platform
    return Math.max(20,base+variance);
  }

  const newPlats=[];
  // Start lastX in the middle third of the screen to avoid edge drift
  let lastX=W*0.3+rng()*(W*0.4);
  let lastY=fromY;
  let prevType='normal';

  for(let i=0;i<count;i++){
    // Y rise: fixed safe range, always reachable
    const rise=30+rng()*12; // 30–42px — well under 67px max jump height
    const effectiveRise=prevType==='spring'?rise*2.0:rise;

    // X shift: small enough to always be reachable horizontally.
    // Max horizontal reach during a jump ≈ SPEED * (2*JUMP_FORCE/GRAVITY) frames
    // = 3.0 * (2*11/0.9) ≈ 3.0 * 24 = 72px. Use 40px max to be safe.
    const xDir=rng()>0.5?1:-1;
    const xShift=xDir*(10+rng()*30); // 10–40px sideways — always reachable

    const pw=platWidth(rng);
    // Clamp center so platform stays in middle 70% of screen
    const rawCenter=lastX+xShift;
    const margin=pw/2+16;
    const clampedCenter=Math.max(margin,Math.min(W-margin,rawCenter));
    const px=Math.max(6,Math.min(W-pw-6,clampedCenter-pw/2));
    const py=lastY-effectiveRise;

    let type=pickW(weights,rng);
    // Never place spike_rotate or blink consecutively — they create impossible timing
    if((type==='spike_rotate'||type==='blink')&&(prevType==='spike_rotate'||prevType==='blink')){
      type='normal';
    }

    const plat=makePlatform(px,py,pw,type,rng);
    if(type==='moving'&&plat.moveAxis==='x'){
      const margin2=6+plat.moveRange;
      plat.originX=Math.max(margin2,Math.min(W-plat.w-margin2,px));
      plat.x=plat.originX;
    }
    if(type==='moving'&&plat.moveAxis==='y'){
      plat.moveRange=Math.min(plat.moveRange,18);
    }
    newPlats.push(plat);
    lastX=px+pw/2;
    lastY=py;
    prevType=type;
  }
  return newPlats;
}

// ─── Init level ───────────────────────────────────────────────────────────────
function initLevel(){
  const rng=mulberry32(level*999+7);
  deathParticles=[];
  lavaY=null;
  lavaStartTime=null;

  if(gameMode==='infinite'){
    // Infinite mode: generate a fresh starting batch of platforms
    infiniteScoredPlats=new Set();
    _infBatchSeed=Date.now();
    // Start platform
    const startPlat=makePlatform(W/2-30,0,60,'normal',rng);
    startPlat.color=[80,200,80];
    platforms=[startPlat];
    boulders=[];
    lasers=[];
    // Lava starts immediately below the start platform
    lavaY=80; // world Y — positive = below start (start is at Y=0)
    lavaStartTime=null;
    // Generate initial batch upward
    const batch=generateInfiniteBatch(0,20);
    platforms.push(...batch);
    const biome=infiniteBiomeOverride||'forest';
    bgDecor=generateBgDecor(0,rng,biome);
  } else {
    const{plats,levelHeight,boulderList,laserList}=generateLevel(level);
    platforms=plats;
    boulders=boulderList;
    lasers=laserList;

    // Lava for levels 91-100
    if(level>=91){
      lavaY=80;
      lavaStartTime=Date.now()+3000;
    }

    const biome=getBiome(level);
    bgDecor=generateBgDecor(levelHeight,rng,biome);
  }

  // Hard/hardcore: check timer
  if((gameMode==='hard'||gameMode==='hardcore')&&hardTimerMs<=0){
    hardTimerMs=3600000;level=1;deaths=0;levelDeaths=0;totalMs=0;timerRunning=false;
  }

  const start=platforms[0];
  player={
    x:start.x+start.w/2-4,
    y:start.y-12,
    w:8,h:12,
    vx:0,vy:0,
    onGround:false,
    dead:false,
    deathTimer:0,
    facingRight:true,
    blinkTimer:0,
    onPlatform:null,
    coyoteFrames:0,
    jumpBufferFrames:0,
    jumpConsumed:false,
    landedPlatId:null,
  };

  camera={y:0};

  // Wind setup — disabled in infinite mode
  const isWindLevel=(level%10===5)&&gameMode!=='infinite';
  if(isWindLevel){
    if(windDir===0||windTimer===0){
      windLevelCount++;
      windDir=windLevelCount%2===1?1:-1;
    }
    windTimer=999999;
  } else {
    windDir=0; windTimer=0;
  }

  // Ghost — disabled in infinite mode
  if(isBossLevel(level)&&gameMode!=='infinite'){ghostActive=true;}
  else{ghostActive=false;}
  startGhostRecording();
  levelStartMs=getElapsedMs();
}

// ─── Kill player ─────────────────────────────────────────────────────────────
function killPlayer(){
  if(player.dead)return;
  player.dead=true;
  player.deathTimer=0;
  deaths++;levelDeaths++;
  // Hard/hardcore: subtract time penalty
  if((gameMode==='hard'||gameMode==='hardcore')&&hardActive){
    hardTimerMs=Math.max(0,hardTimerMs-HARD_DEATH_PENALTY);
  }
  currentDeathMsg=getDeathMsg();
  deathSfx.currentTime=0;deathSfx.play().catch(()=>{});
  for(let i=0;i<20;i++){
    const angle=Math.random()*Math.PI*2;
    const spd=1+Math.random()*3;
    deathParticles.push({x:player.x+player.w/2,y:player.y+player.h/2,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,life:40+Math.random()*30,maxLife:70,c:[255,80+Math.floor(Math.random()*100),0]});
  }
}

    }
    saveProgress();
    startTransition('out',null,()=>{gameState='menu';menuStarted=true;setMusicTrack('title.mp3');});
    return;
  }
  if(e.key==='Escape'&&gameState==='records'){gameState='menu';return;}
  if(gameState!=='playing')return;
  if((e.key===' '||e.key==='Enter'||e.key==='ArrowUp')&&player&&player.dead&&player.deathTimer>60){
    if(gameMode==='hardcore'){level=1;deaths=0;levelDeaths=0;totalMs=0;timerRunning=false;timerStart=null;hardTimerMs=3600000;lastHardTick=Date.now();setMusicTrack(trackForLevel(1));}
    if(gameMode==='infinite'){
      // Reset score, respawn at bottom of current infinite level
      infiniteScore=0;infinitePlatCount=0;infiniteBiomeOverride=null;lastInfiniteBiome=null;
      _infCurrentBiomeIdx=0;lavaY=null;lavaStartTime=null;
      boulders=[];lasers=[];
    }
    startGhostRecording();initLevel();
  }
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

const BTN_PLAY ={x:W/2-40,y:190,w:80,h:18};
const BTN_REC  ={x:W/2-50,y:215,w:100,h:18};
const BTN_RESET={x:W/2-38,y:240,w:76,h:18};

const BTN_END_HOME={x:W/2-45,y:H-40,w:90,h:18};

canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const sx=W/rect.width,sy=(H+BRAND_H)/rect.height;
  const mx=(e.clientX-rect.left)*sx,my=(e.clientY-rect.top)*sy;

  if(gameState==='menu'){
    if(inBtn(mx,my,BTN_PLAY)){
      playClick();tryPlayMusic();
      startTransition('out',null,()=>{
        if(hasSavedProgress()){
          loadProgress(); // restores level, deaths, totalMs, AND hardTimerMs
          if((gameMode==='hard'||gameMode==='hardcore')){
            hardActive=true;lastHardTick=Date.now(); // resume timer from saved value
          }
        } else {
          level=1;deaths=0;totalMs=0;
          if(gameMode==='hard'||gameMode==='hardcore'){hardTimerMs=3600000;hardActive=true;lastHardTick=Date.now();}
        }
        timerRunning=false;timerStart=null;
        windLevelCount=0;
        if(gameMode==='infinite'){infiniteScore=0;infinitePlatCount=0;infiniteBiomeOverride=null;_infCurrentBiomeIdx=0;}
        initLevel();gameState='playing';menuStarted=true;
        setMusicTrack(trackForLevel(level));
      });
    }
    // Mode toggle
    if(inBtn(mx,my,BTN_MODE)){
      playClick();
      saveProgress(); // save current mode first
      gameMode=MODES[(MODES.indexOf(gameMode)+1)%MODES.length];
      // Load new mode's progress
      if(hasSavedProgress())loadProgress();
      else{level=1;deaths=0;totalMs=0;}
      timerRunning=false;timerStart=null;
      playthroughSeed=Math.floor(Math.random()*0xffffff);
    }
    if(inBtn(mx,my,BTN_REC)){playClick();startTransition('out',null,()=>{gameState='records';});}
    if(menuStarted&&inBtn(mx,my,BTN_RESET)){
      playClick();clearAllData();level=1;deaths=0;timerRunning=false;timerStart=null;
      playthroughSeed=Math.floor(Math.random()*0xffffff);menuStarted=false;windLevelCount=0;
    }
    return;
  }
  if(gameState==='records'){
    if(inBtn(mx,my,BTN_TAB_NORMAL)){playClick();recordsTab='normal';return;}
    if(inBtn(mx,my,BTN_TAB_HARD)){playClick();recordsTab='hard';return;}
    if(inBtn(mx,my,BTN_TAB_HC)){playClick();recordsTab='hardcore';return;}
    if(inBtn(mx,my,BTN_TAB_INF)){playClick();recordsTab='infinite';return;}
    if(inBtn(mx,my,BTN_BACK)){playClick();startTransition('out',null,()=>{gameState='menu';});}
    return;
  }
  if(gameState==='endscreen'){
    if(inBtn(mx,my,BTN_END_HOME)){
      playClick();clearProgress();level=1;deaths=0;timerRunning=false;timerStart=null;
      playthroughSeed=Math.floor(Math.random()*0xffffff);menuStarted=true;gameState='menu';windLevelCount=0;
    }
    return;
  }
  if(gameState!=='playing'||!player)return;
  if(player.dead&&player.deathTimer>60){
    if(gameMode==='hardcore'){level=1;deaths=0;levelDeaths=0;totalMs=0;timerRunning=false;timerStart=null;hardTimerMs=3600000;lastHardTick=Date.now();setMusicTrack(trackForLevel(1));}
    if(gameMode==='infinite'){infiniteScore=0;infinitePlatCount=0;infiniteBiomeOverride=null;lastInfiniteBiome=null;_infCurrentBiomeIdx=0;lavaY=null;lavaStartTime=null;boulders=[];lasers=[];}
    startGhostRecording();initLevel();return;
  }
});
